# Docker Compose for local WordPress development with Astrologer API plugin.
#
# Usage:
#   docker compose up -d
#   open http://localhost:8080
#
# The plugin directory is bind-mounted into the WordPress container,
# so file changes are reflected immediately.

services:
    db:
        image: mariadb:11
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: rootpass
            MYSQL_DATABASE: wordpress
            MYSQL_USER: wp
            MYSQL_PASSWORD: wp
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
            interval: 10s
            timeout: 5s
            retries: 5

    wordpress:
        image: wordpress:6-php8.2-apache
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        ports:
            - '8080:80'
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_NAME: wordpress
            WORDPRESS_DB_USER: wp
            WORDPRESS_DB_PASSWORD: wp
            WORDPRESS_DEBUG: '1'
        volumes:
            # Bind-mount the plugin into the WP plugins directory
            - .:/var/www/html/wp-content/plugins/astrologer-api-playground
            - wp_data:/var/www/html

volumes:
    db_data:
    wp_data:
