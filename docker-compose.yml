# Docker Compose for local WordPress development with Astrologer API plugin.
#
# Usage:
#   docker compose up -d
#   open http://localhost:8080
#
# The plugin directory is bind-mounted into the WordPress container,
# so file changes are reflected immediately.
#
# On first run, the wp-setup service auto-installs WordPress and
# activates the plugin so you can start testing immediately.

services:
    db:
        image: mariadb:11
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: rootpass
            MYSQL_DATABASE: wordpress
            MYSQL_USER: wp
            MYSQL_PASSWORD: wp
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
            interval: 10s
            timeout: 5s
            retries: 5

    wordpress:
        image: wordpress:6-php8.2-apache
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        ports:
            - '8080:80'
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_NAME: wordpress
            WORDPRESS_DB_USER: wp
            WORDPRESS_DB_PASSWORD: wp
            WORDPRESS_DEBUG: '1'
        volumes:
            - wp_data:/var/www/html
            # Bind-mount the plugin into the WP plugins directory
            - .:/var/www/html/wp-content/plugins/astrologer-api-playground

    wp-setup:
        image: wordpress:cli
        depends_on:
            db:
                condition: service_healthy
        environment:
            WORDPRESS_DB_HOST: db
            WORDPRESS_DB_NAME: wordpress
            WORDPRESS_DB_USER: wp
            WORDPRESS_DB_PASSWORD: wp
            RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
            GEONAMES_USERNAME: ${GEONAMES_USERNAME:-}
        volumes:
            - wp_data:/var/www/html
            - .:/var/www/html/wp-content/plugins/astrologer-api-playground
        entrypoint: /bin/sh
        command:
            - -c
            - |
                echo "Waiting for WordPress files..."
                until [ -f /var/www/html/wp-includes/version.php ]; do sleep 2; done
                echo "WordPress files ready. Running setup..."

                if ! wp core is-installed --path=/var/www/html 2>/dev/null; then
                    wp core install \
                        --path=/var/www/html \
                        --url="http://localhost:8080" \
                        --title="AstrologerWP Test" \
                        --admin_user=admin \
                        --admin_password=admin \
                        --admin_email=admin@example.com \
                        --skip-email
                    echo "WordPress installed."
                else
                    echo "WordPress already installed."
                fi

                wp plugin activate astrologer-api-playground --path=/var/www/html 2>/dev/null || true

                # Pre-configure API keys if provided via environment
                if [ -n "$RAPIDAPI_KEY" ] || [ -n "$GEONAMES_USERNAME" ]; then
                    echo "Configuring plugin settings..."
                    wp eval --path=/var/www/html '
                        $s = get_option("astrologer_api_settings", array());
                        $env_key = getenv("RAPIDAPI_KEY");
                        $env_geo = getenv("GEONAMES_USERNAME");
                        if ($env_key) $s["rapidapi_key"] = $env_key;
                        if ($env_geo) $s["geonames_username"] = $env_geo;
                        update_option("astrologer_api_settings", $s);
                    '
                fi

                echo ""
                echo "============================================"
                echo "  WordPress ready at http://localhost:8080"
                echo "  Admin: http://localhost:8080/wp-admin"
                echo "  User: admin / Password: admin"
                echo "  Plugin: Astrologer API Playground (active)"
                [ -n "$RAPIDAPI_KEY" ] && echo "  RapidAPI Key: configured"
                [ -n "$GEONAMES_USERNAME" ] && echo "  GeoNames: configured ($GEONAMES_USERNAME)"
                echo "============================================"

volumes:
    db_data:
    wp_data:
