<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <!-- Outer zodiac ring -->
  <circle cx="128" cy="116" r="72" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.6"/>
  <!-- Middle ring -->
  <circle cx="128" cy="116" r="52" fill="none" stroke="#7c3aed" stroke-width="2.5" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="128" cy="116" r="32" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
  <!-- Cross lines inside wheel -->
  <line x1="128" y1="44" x2="128" y2="188" stroke="#6d28d9" stroke-width="1" opacity="0.3"/>
  <line x1="56" y1="116" x2="200" y2="116" stroke="#6d28d9" stroke-width="1" opacity="0.3"/>
  <!-- Diagonal lines -->
  <line x1="77" y1="65" x2="179" y2="167" stroke="#6d28d9" stroke-width="0.5" opacity="0.2"/>
  <line x1="179" y1="65" x2="77" y2="167" stroke="#6d28d9" stroke-width="0.5" opacity="0.2"/>
  <!-- Planet dots on the wheel -->
  <circle cx="128" cy="44" r="5" fill="#facc15"/>
  <circle cx="172" cy="66" r="4" fill="#f97316"/>
  <circle cx="192" cy="112" r="4" fill="#ef4444"/>
  <circle cx="176" cy="156" r="3.5" fill="#a78bfa"/>
  <circle cx="128" cy="180" r="5" fill="#38bdf8"/>
  <circle cx="84" cy="156" r="3.5" fill="#34d399"/>
  <circle cx="64" cy="112" r="4" fill="#facc15"/>
  <circle cx="84" cy="66" r="3.5" fill="#fb923c"/>
  <!-- Moon crescent -->
  <path d="M144 100 A20 20 0 1 1 144 132 A14 14 0 1 0 144 100Z" fill="#c4b5fd" opacity="0.7"/>
  <!-- Text -->
  <text x="128" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9" letter-spacing="1">Astrologer</text>
</svg>
