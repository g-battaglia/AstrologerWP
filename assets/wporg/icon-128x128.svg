<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  <!-- Outer zodiac ring -->
  <circle cx="64" cy="58" r="36" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  <!-- Middle ring -->
  <circle cx="64" cy="58" r="26" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="64" cy="58" r="16" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <!-- Cross lines inside wheel -->
  <line x1="64" y1="22" x2="64" y2="94" stroke="#6d28d9" stroke-width="0.5" opacity="0.3"/>
  <line x1="28" y1="58" x2="100" y2="58" stroke="#6d28d9" stroke-width="0.5" opacity="0.3"/>
  <!-- Planet dots on the wheel -->
  <circle cx="64" cy="22" r="3" fill="#facc15"/>
  <circle cx="86" cy="33" r="2.5" fill="#f97316"/>
  <circle cx="96" cy="56" r="2.5" fill="#ef4444"/>
  <circle cx="88" cy="78" r="2" fill="#a78bfa"/>
  <circle cx="64" cy="90" r="2.5" fill="#38bdf8"/>
  <circle cx="42" cy="78" r="2" fill="#34d399"/>
  <circle cx="32" cy="56" r="2.5" fill="#facc15"/>
  <circle cx="42" cy="33" r="2" fill="#fb923c"/>
  <!-- Moon crescent -->
  <path d="M72 50 A12 12 0 1 1 72 66 A8 8 0 1 0 72 50Z" fill="#c4b5fd" opacity="0.7"/>
  <!-- Text -->
  <text x="64" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f1f5f9" letter-spacing="0.5">Astrologer</text>
</svg>
